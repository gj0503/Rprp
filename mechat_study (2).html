<html lang="ko">

<title>MECHATRONICS STUDY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;
  --s1:#ffffff;
  --s2:#f5f7fa;
  --s3:#eaecf0;
  --border:#d8dde6;
  --border2:#c4cad6;
  --text:#1a2035;
  --text2:#5a6580;
  --text3:#9aa0b0;
  --accent:#0066ff;
  --accent2:#0044cc;
  --green:#00a86b;
  --yellow:#e6a000;
  --orange:#e05000;
  --red:#d42020;
  --purple:#6633cc;
}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.app{max-width:520px;margin:0 auto;padding-bottom:84px}

/* HEADER */
.header{
  background:var(--s1);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  padding:12px 16px;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--accent);text-transform:uppercase}
.hdr-streak{font-size:10px;color:var(--text2);letter-spacing:.06em}
.hdr-streak span{color:var(--yellow);font-weight:700}
.prog-wrap{position:relative;height:20px;background:var(--s3);border:1px solid var(--border);overflow:hidden}
.prog-fill{height:100%;background:var(--accent);opacity:.15;transition:width .6s}
.prog-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 10px}
.prog-label{font-size:9px;letter-spacing:.1em;color:var(--text2);text-transform:uppercase}
.prog-val{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em}
.prog-cnt{font-size:9px;color:var(--text3)}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:66px;z-index:99}
.tb{flex:1;padding:10px 0;text-align:center;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);transition:all .2s}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}

/* SECTION LABEL */
.sec{padding:14px 16px 6px;font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);margin:0 14px 8px;overflow:hidden}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.item:last-child{border-bottom:none}
.item:active{background:var(--s2)}
.chk{width:18px;height:18px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--green);font-weight:700;flex-shrink:0;transition:all .15s}
.chk.on{border-color:var(--green);background:rgba(0,230,118,.1)}

/* SUBJECT TABS */
.st{display:flex;overflow-x:auto;gap:0;border-bottom:1px solid var(--border);scrollbar-width:none}
.stb{padding:8px 14px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.stb:last-child{border-right:none}

/* CHAPTER */
.ch{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--s2)}
.cc2{width:16px;height:16px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--green);flex-shrink:0}
.cb{height:1px;background:var(--border)}
.si{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 44px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.si:active{background:var(--s2)}
.sc2{width:12px;height:12px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--green);font-weight:700;flex-shrink:0;transition:all .15s}
.sc2.on{border-color:var(--green);background:rgba(0,230,118,.1)}

/* BOTTOM BAR */
.bb{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;z-index:200;
}
.bs{flex:1;padding:10px 0 14px;text-align:center;border-right:1px solid var(--border)}
.bs:last-child{border-right:none}
.bs-num{font-size:15px;font-weight:700;letter-spacing:.04em;margin-bottom:2px}
.bs-lbl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

/* NAV */
.nb{width:32px;height:32px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb:active{background:var(--s3);color:var(--accent)}

/* GRID STATS */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin:0 14px 8px;border:1px solid var(--border)}
.stat-cell{background:var(--s1);padding:14px;text-align:center}
.stat-num{font-size:22px;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
.stat-lbl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

/* BAR */
.bar-wrap{height:2px;background:var(--border);overflow:hidden;margin-top:6px}
.bar-fill{height:100%;transition:width .4s}

/* CAL DAY */
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;border:1px solid transparent;transition:all .1s}
.cal-day:active{opacity:.7}

/* PHASE TAG */
.ptag{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid;margin-right:6px}
</style>
</head>

const SS='2026-06-18';
const DK=['일','월','화','수','목','금','토'];
function pl(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ts(){return ds(new Date());}
function fd(s){const d=pl(s);return `${d.getMonth()+1}/${d.getDate()} (${DK[d.getDay()]})`;}
function gc(s){return pl(s).getDay()===0?0:7;}

function initDone(){
  const done={};
  CUR.forEach(sj=>{let c=0;sj.chapters.forEach(ch=>ch.s.forEach(s=>{if(c<sj.done_until){done[s.id]=true;c++;}}));});
  return done;
}
function getAllItems(sid){
  const sj=CUR.find(s=>s.id===sid);const arr=[];
  sj.chapters.forEach(ch=>ch.s.forEach(s=>arr.push({id:s.id,n:s.n,sid:sj.id,sname:sj.name,short:sj.short,cht:ch.t,color:sj.color})));
  return arr;
}
function bs(sta){
  const sc={};
  const get=(sid)=>getAllItems(sid).filter(i=>!sta||!sta[i.id]);
  let pm=get('PM'),km=get('KM'),ma=get('MA'),la=get('LA'),hd=get('HD');
  let ci=get('CI'),st=get('ST'),dy=get('DY'),em=get('EM');
  const allDone=[];
  CUR.forEach(sj=>getAllItems(sj.id).forEach(it=>{if(sta&&sta[it.id])allDone.push(it);}));
  if(allDone.length>0){
    const pastSt=new Date(pl(SS));pastSt.setDate(pastSt.getDate()-1);
    let di=allDone.length-1;let pd=0;
    while(di>=0){
      const dt=new Date(pastSt);dt.setDate(pastSt.getDate()-pd);
      const dstr=ds(dt);
      if(dt.getDay()!==0){const day=[];while(day.length<7&&di>=0){day.unshift(allDone[di--]);}sc[dstr]=day;}
      pd++;if(pd>200)break;
    }
  }
  let pmi=0,kmi=0,mai=0,lai=0,hdi=0,cii=0,sti=0,dyi=0,emi=0,d=0;
  const p1=()=>pmi>=pm.length&&kmi>=km.length;
  const p2=()=>p1()&&mai>=ma.length&&lai>=la.length&&hdi>=hd.length;
  const p3=()=>p2()&&cii>=ci.length&&sti>=st.length;
  const p4=()=>p3()&&dyi>=dy.length;
  const done=()=>p4()&&emi>=em.length;
  while(!done()){
    const dt=new Date(pl(SS));dt.setDate(pl(SS).getDate()+d);
    const dstr=ds(dt);const cap=gc(dstr);
    if(cap>0){
      const day=[];
      if(!p1()){
        while(day.length<3&&pmi<pm.length)day.push(pm[pmi++]);
        while(day.length<5&&kmi<km.length)day.push(km[kmi++]);
        while(day.length<cap&&mai<ma.length)day.push(ma[mai++]);
        while(day.length<cap&&kmi<km.length)day.push(km[kmi++]);
      } else if(!p2()){
        let mc=0,lc=0,hc=0;
        while(mc<3&&mai<ma.length){day.push(ma[mai++]);mc++;}
        while(lc<2&&lai<la.length){day.push(la[lai++]);lc++;}
        while(hc<2&&hdi<hd.length){day.push(hd[hdi++]);hc++;}
        while(day.length<cap&&mai<ma.length)day.push(ma[mai++]);
        while(day.length<cap&&lai<la.length)day.push(la[lai++]);
        while(day.length<cap&&hdi<hd.length)day.push(hd[hdi++]);
      } else if(!p3()){
        let cc=0,sc=0;
        while(cc<4&&cii<ci.length){day.push(ci[cii++]);cc++;}
        while(sc<3&&sti<st.length){day.push(st[sti++]);sc++;}
        while(day.length<cap&&cii<ci.length)day.push(ci[cii++]);
        while(day.length<cap&&sti<st.length)day.push(st[sti++]);
      } else if(!p4()){
        while(day.length<cap&&dyi<dy.length)day.push(dy[dyi++]);
      } else {
        while(day.length<cap&&emi<em.length)day.push(em[emi++]);
      }
      sc[dstr]=day;
    } else sc[dstr]=[];
    d++;if(d>600)break;
  }
  return sc;
}

            <div style="font-size:12px;color:${dn?'var(--text3)':'var(--text)'};text-decoration:${dn?'line-through':'none'};line-height:1.5">${it.n}</div>
          </div>
          ${dn?`<div style="font-size:9px;color:var(--green);letter-spacing:.06em">DONE</div>`:''}
        </div>`;
      });
      h+=`</div>`;
    });
  }
  document.getElementById('cnt').innerHTML=h;
}

function rCal(){
  const yr=Math.floor(cm/12);const mo=cm%12;
  const last=new Date(yr,mo+1,0);const today=ts();
  let mTotal=0,mDone=0;
  for(let d=1;d<=last.getDate();d++){
    const dstr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=SC[dstr]||[];mTotal+=items.length;mDone+=items.filter(i=>STA[i.id]).length;
  }
  const mPct=mTotal>0?Math.round(mDone/mTotal*100):0;

  let h=`
  <div style="display:flex;align-items:center;gap:10px;padding:14px 16px 10px">
    <button class="nb" onclick="pm()">‹</button>
    <div style="flex:1;text-align:center">
      <div style="font-size:14px;font-weight:700;letter-spacing:.08em;color:var(--text)">${yr}.${String(mo+1).padStart(2,'0')}</div>
      <div style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px">${mDone}/${mTotal} LECTURES · ${mPct}%</div>
    </div>
    <button class="nb" onclick="nm()">›</button>
  </div>
  <div style="margin:0 14px 10px;background:var(--s1);border:1px solid var(--border)">
    <div style="height:2px;background:var(--s3)"><div style="height:100%;width:${mPct}%;background:var(--accent);transition:width .4s"></div></div>
    <div style="display:flex;justify-content:space-between;padding:8px 14px">
      <span style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase">MONTHLY PROGRESS</span>
      <span style="font-size:9px;color:var(--accent);font-weight:700;letter-spacing:.06em">${mPct}%</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin:0 14px 1px;border:1px solid var(--border)">`;
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach((d,i)=>{
    h+=`<div style="background:var(--s2);padding:6px 0;text-align:center;font-size:8px;font-weight:700;letter-spacing:.08em;color:${i===0?'var(--red)':i===6?'var(--accent)':'var(--text3)'}">${d}</div>`;
  });
  h+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin:0 14px 10px;border:1px solid var(--border)">`;
  const startDay=new Date(yr,mo,1).getDay();
  for(let i=0;i<startDay;i++)h+=`<div style="background:var(--bg);aspect-ratio:1"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dstr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=SC[dstr]||[];
    const done=items.filter(i=>STA[i.id]).length;
    const total=items.length;
    const cap=gc(dstr);
    const isT=dstr===today;
    const dow=(new Date(yr,mo,d)).getDay();
    const pct=total>0?Math.round(done/total*100):0;
    const allDone=total>0&&done===total;
    const someD=total>0&&done>0&&!allDone;
    let bg='var(--s1)';
    if(cap===0)bg='var(--bg)';
    else if(allDone)bg='rgba(0,230,118,.12)';
    else if(someD)bg=`rgba(0,212,255,${Math.max(.05,pct/100*.15)})`;
    const tc=dow===0?'var(--red)':dow===6?'var(--accent)':'var(--text)';
    const border=isT?'1px solid var(--accent)':'none';
    h+=`<div onclick="goDay('${dstr}')" style="background:${bg};aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;border:${border};position:relative">
      ${isT?`<div style="position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)"></div>`:''}
      <div style="font-size:11px;font-weight:700;color:${isT?'var(--accent)':tc}">${d}</div>`;
    if(cap===0){
      h+=`<div style="font-size:7px;color:var(--text3);letter-spacing:.04em">OFF</div>`;
    } else if(total>0){
      h+=`<div style="font-size:9px;font-weight:700;color:${allDone?'var(--green)':someD?'var(--accent)':'var(--text3)'}">${pct}%</div>
      <div style="width:70%;height:1px;background:var(--border)">
        <div style="height:100%;width:${pct}%;background:${allDone?'var(--green)':'var(--accent)'}"></div>
      </div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  // 요일별 달성률
  const dayT=Array(7).fill(0);const dayD=Array(7).fill(0);
  for(let d=1;d<=last.getDate();d++){
    const dstr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(new Date(yr,mo,d)).getDay();
    const items=SC[dstr]||[];
    dayT[dow]+=items.length;dayD[dow]+=items.filter(i=>STA[i.id]).length;
  }
  const maxP=Math.max(...dayT.map((t,i)=>t>0?Math.round(dayD[i]/t*100):0),1);
  const DK2=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  h+=`<div style="background:var(--s1);border:1px solid var(--border);margin:0 14px 8px;padding:14px">
    <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px">WEEKDAY COMPLETION RATE</div>
    <div style="display:flex;gap:2px;align-items:flex-end;height:48px">`;
  dayT.forEach((tot,i)=>{
    const p=tot>0?Math.round(dayD[i]/tot*100):0;
    const hh=tot>0?Math.max(2,Math.round(p/maxP*40)):2;
    const col=i===0?'var(--red)':i===6?'var(--accent)':'var(--green)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="font-size:8px;font-weight:700;color:${tot>0?col:'var(--text3)'};letter-spacing:.04em">${tot>0?p+'%':'-'}</div>
      <div style="width:100%;background:${tot>0?col:'var(--border)'};height:${hh}px"></div>
      <div style="font-size:7px;color:${i===0?'var(--red)':i===6?'var(--accent)':'var(--text3)'};letter-spacing:.06em">${DK2[i].slice(0,3)}</div>
    </div>`;
  });
  h+=`</div></div>`;
  document.getElementById('cnt').innerHTML=h;
}
function goDay(dstr){const t=pl(ts());const d=pl(dstr);off=Math.round((d-t)/86400000);setTab('today');}
function pm(){cm--;render();}
function nm(){cm++;render();}

function rDash(){
  const o=ov();
  let h=`<div class="sec">SYSTEM STATUS</div>
  <div style="background:var(--s1);border:1px solid var(--border);margin:0 14px 8px;padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
      <div>
        <div style="font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:4px">TOTAL COMPLETION</div>
        <div style="font-size:9px;color:var(--text2)">${o.d} done · ${o.t-o.d} remaining · ${o.t} total</div>
      </div>
      <div style="font-size:36px;font-weight:700;color:var(--accent);letter-spacing:.02em">${o.p}%</div>
    </div>
    <div style="height:2px;background:var(--s3)">
      <div style="height:100%;width:${o.p}%;background:var(--accent);transition:width .4s"></div>
    </div>
  </div>`;

  h+=`<div class="sec">PHASE BREAKDOWN</div>
  <div style="background:var(--s1);border:1px solid var(--border);margin:0 14px 8px">`;
  PHASES.forEach((ph,i)=>{
    const items=ph.ids.flatMap(id=>getAllItems(id));
    const done=items.filter(i=>STA[i.id]).length;
    const pct=items.length?Math.round(done/items.length*100):0;
    const isDone=done===items.length;
    const isLast=i===PHASES.length-1;
    h+=`<div style="padding:12px 14px;${!isLast?'border-bottom:1px solid var(--border)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:8px;font-weight:700;letter-spacing:.1em;color:${ph.color};border:1px solid ${ph.color};padding:2px 6px">${ph.n}</span>
          <span style="font-size:12px;color:var(--text);font-weight:700">${ph.label}</span>
        </div>
        <span style="font-size:11px;color:${isDone?'var(--green)':'var(--text2)'};font-weight:700;letter-spacing:.04em">${isDone?'COMPLETE':pct+'%'}</span>
      </div>
      <div style="height:1px;background:var(--s3)">
        <div style="height:100%;width:${pct}%;background:${isDone?'var(--green)':ph.color};transition:width .4s"></div>
      </div>
      <div style="font-size:9px;color:var(--text3);margin-top:6px;letter-spacing:.04em">${done} / ${items.length} lectures</div>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="sec">MODULE STATUS</div>
  <div style="background:var(--s1);border:1px solid var(--border);margin:0 14px 8px">`;
  CUR.forEach((sj,i)=>{
    const p=sp(sj.id);const isLast=i===CUR.length-1;
    h+=`<div style="padding:10px 14px;${!isLast?'border-bottom:1px solid var(--border)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:2px;height:14px;background:${sj.color}"></div>
          <span style="font-size:9px;font-weight:700;letter-spacing:.1em;color:${sj.color}">${sj.short}</span>
          <span style="font-size:11px;color:var(--text)">${sj.name}</span>
        </div>
        <span style="font-size:10px;color:var(--text2);letter-spacing:.04em">${p.d}/${p.t}</span>
      </div>
      <div style="height:1px;background:var(--s3)">
        <div style="height:100%;width:${p.p}%;background:${sj.color};transition:width .4s"></div>
      </div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('cnt').innerHTML=h;
}

function rC(){
  const sj=CUR.find(s=>s.id===cs);const pg=sp(cs);
  let h=`<div class="st">`;
  CUR.forEach(s=>{
    const p=sp(s.id);const ac=cs===s.id;
    h+=`<button class="stb" style="${ac?`color:${s.color};border-bottom:2px solid ${s.color};background:${s.color}11`:''}" onclick="setCS('${s.id}')">${s.short} <span style="opacity:.5;font-size:8px">${p.p}%</span></button>`;
  });
  h+=`</div>
  <div style="padding:14px 16px 10px;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div style="font-size:8px;letter-spacing:.14em;color:${sj.color};text-transform:uppercase;margin-bottom:4px">PHASE ${sj.phase} · ${sj.short}</div>
        <div style="font-size:16px;font-weight:700;color:var(--text)">${sj.name}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:.04em">${sj.info}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:32px;font-weight:700;color:${sj.color};letter-spacing:.02em">${pg.p}%</div>
        <div style="font-size:9px;color:var(--text3);letter-spacing:.06em">${pg.d}/${pg.t}</div>
      </div>
    </div>
    <div style="height:1px;background:var(--s3);margin-top:10px">
      <div style="height:100%;width:${pg.p}%;background:${sj.color};transition:width .4s"></div>
    </div>
  </div>`;
  sj.chapters.forEach(ch=>{
    const op=!!oc[ch.id];const cd=ch.s.filter(s=>STA[s.id]).length;
    const ad=cd===ch.s.length&&ch.s.length>0;const pt=cd>0&&!ad;
    h+=`<div class="card">
      <div class="ch" onclick="tC('${ch.id}')">
        <div class="cc2">${ad?'✓':pt?'·':''}</div>
        <span style="font-size:11px;font-weight:700;color:${ad?'var(--text3)':'var(--text)'};flex:1;text-decoration:${ad?'line-through':'none'}">${ch.t}</span>
        <span style="font-size:9px;color:var(--text3);margin-right:8px;letter-spacing:.06em">${cd}/${ch.s.length}</span>
        <span style="font-size:9px;color:var(--text3);transition:transform .2s;display:inline-block;transform:${op?'rotate(180deg)':'none'}">${op?'▲':'▼'}</span>
      </div>
      <div class="cb"><div style="height:100%;width:${ch.s.length?cd/ch.s.length*100:0}%;background:${sj.color};transition:width .3s"></div></div>`;
    if(op){
      ch.s.forEach(s=>{
        const dn=!!STA[s.id];
        h+=`<div class="si" onclick="tg('${s.id}')">
          <div class="sc2 ${dn?'on':''}">${dn?'✓':''}</div>
          <span style="font-size:11px;color:${dn?'var(--text3)':'var(--text)'};text-decoration:${dn?'line-through':'none'};flex:1;line-height:1.5">${s.n}</span>
          ${dn?`<span style="font-size:8px;color:var(--green);letter-spacing:.06em">✓</span>`:''}
        </div>`;
      });
    }
    h+=`</div>`;
  });
  document.getElementById('cnt').innerHTML=h;
}

function setTab(t){tab=t;render();}
function setOff(o){off=o;render();}
function setCS(id){cs=id;oc={};render();}
function tC(id){oc[id]=!oc[id];render();}
init();
</script>
