const SS='2026-06-15';
const DK=['일','월','화','수','목','금','토'];
function pl(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ts(){return ds(new Date());}
function fd(s){const d=pl(s);return `${d.getMonth()+1}/${d.getDate()} (${DK[d.getDay()]})`;}
function gc(s){const w=pl(s).getDay();if(s===SS)return 6;return w===0?0:6;}
function bs(sta){
  const sc={};
  let pm=[],km=[],py=[],la=[],ma=[];
  CUR.forEach(sj=>{
    if(sj.id==='PM')sj.chapters.forEach(ch=>ch.s.forEach(s=>pm.push({id:s.id,n:s.n,sid:'PM',sname:'내일은물리량',cht:ch.t,color:'#f97316'})));
    if(sj.id==='KM')sj.chapters.forEach(ch=>ch.s.forEach(s=>km.push({id:s.id,n:s.n,sid:'KM',sname:'물아일체',cht:ch.t,color:'#ec4899'})));
    if(sj.id==='PY')sj.chapters.forEach(ch=>ch.s.forEach(s=>py.push({id:s.id,n:s.n,sid:'PY',sname:'파이썬',cht:ch.t,color:'#10b981'})));
    if(sj.id==='LA')sj.chapters.forEach(ch=>ch.s.forEach(s=>la.push({id:s.id,n:s.n,sid:'LA',sname:'선형대수학',cht:ch.t,color:'#8b5cf6'})));
    if(sj.id==='MA')sj.chapters.forEach(ch=>ch.s.forEach(s=>ma.push({id:s.id,n:s.n,sid:'MA',sname:'미적분학',cht:ch.t,color:'#e11d48'})));
  });

  // 완료된 항목은 과거 날짜에 역순으로 배치
  const allDone=[];
  [pm,km,py,la,ma].forEach(arr=>arr.forEach(it=>{if(sta&&sta[it.id])allDone.push(it);}));
  if(allDone.length>0){
    const pastSt=new Date(pl(SS));pastSt.setDate(pastSt.getDate()-1);
    let di=allDone.length-1;let pd=0;
    while(di>=0){
      const dt=new Date(pastSt);dt.setDate(pastSt.getDate()-pd);
      const dstr=ds(dt);const w=dt.getDay();
      if(w!==0){
        const day=[];
        while(day.length<6&&di>=0){day.unshift(allDone[di--]);}
        sc[dstr]=day;
      }
      pd++;if(pd>200)break;
    }
  }

  // 미완료 항목은 오늘부터 배치
  const pmT=pm.filter(it=>!sta||!sta[it.id]);
  const kmT=km.filter(it=>!sta||!sta[it.id]);
  const pyT=py.filter(it=>!sta||!sta[it.id]);
  const laT=la.filter(it=>!sta||!sta[it.id]);
  const maT=ma.filter(it=>!sta||!sta[it.id]);

  let d=0,pmi=0,kmi=0,pyi=0,lai=0,mai=0;
  const st=pl(SS);
  const phase1Done=()=>pmi>=pmT.length&&kmi>=kmT.length;
  while(!phase1Done()||pyi<pyT.length||lai<laT.length||mai<maT.length){
    const dt=new Date(st);dt.setDate(st.getDate()+d);
    const dstr=ds(dt);const c=gc(dstr);
    if(c>0){
      const day=[];
      if(!phase1Done()){
        let pmc=0;while(pmc<2&&pmi<pmT.length){day.push(pmT[pmi++]);pmc++;}
        let kmc=0;while(kmc<2&&kmi<kmT.length){day.push(kmT[kmi++]);kmc++;}
        while(day.length<4&&kmi<kmT.length){day.push(kmT[kmi++]);}
        let pyc=0;while(pyc<1&&pyi<pyT.length){day.push(pyT[pyi++]);pyc++;}
        let lac=0;while(lac<1&&lai<laT.length){day.push(laT[lai++]);lac++;}
        while(day.length<c&&kmi<kmT.length){day.push(kmT[kmi++]);}
        while(day.length<c&&pyi<pyT.length){day.push(pyT[pyi++]);}
        while(day.length<c&&lai<laT.length){day.push(laT[lai++]);}
      } else {
        let mac=0;while(mac<2&&mai<maT.length){day.push(maT[mai++]);mac++;}
        let pyc=0;while(pyc<2&&pyi<pyT.length){day.push(pyT[pyi++]);pyc++;}
        let lac=0;while(lac<2&&lai<laT.length){day.push(laT[lai++]);lac++;}
        while(day.length<c&&mai<maT.length)day.push(maT[mai++]);
        while(day.length<c&&lai<laT.length)day.push(laT[lai++]);
        while(day.length<c&&pyi<pyT.length)day.push(pyT[pyi++]);
      }
      sc[dstr]=day;
    }else sc[dstr]=[];
    d++;if(d>1000)break;
  }
  return sc;
}

  CUR.forEach(s=>{const p=sp(s.id);const ac=cs===s.id;h+=`<button class="stb" style="${ac?`background:${s.color}22;border-color:${s.color}88;color:${s.color}`:''}" onclick="setCS('${s.id}')">${s.name} <span style="opacity:.7;font-size:10px">${p.p}%</span></button>`;});
  h+=`</div><div style="padding:14px 14px 8px"><div style="display:flex;align-items:center;justify-content:space-between"><div><span style="font-size:16px;font-weight:900;color:${sj.color}">${sj.name}</span><div style="font-size:11px;color:#64748b;margin-top:3px">${sj.info}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:${sj.color}">${pg.p}%</div><div style="font-size:11px;color:#64748b">${pg.d}/${pg.t}</div></div></div><div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:10px"><div style="height:100%;width:${pg.p}%;background:${sj.color};border-radius:3px;transition:width .4s"></div></div></div>`;
  sj.chapters.forEach(ch=>{const op=!!oc[ch.id];const cd=ch.s.filter(s=>STA[s.id]).length;const ad=cd===ch.s.length&&ch.s.length>0;const pt=cd>0&&!ad;h+=`<div class="card"><div class="ch" onclick="tC('${ch.id}')"><div class="cc2 ${ad?'dn':pt?'pt':''}">${ad?'✓':''}</div><span style="font-size:13px;font-weight:700;color:${ad?'#94a3b8':'#1e293b'};flex:1;text-decoration:${ad?'line-through':'none'}">${ch.t}</span><span style="font-size:11px;color:#94a3b8;margin-right:6px">${cd}/${ch.s.length}</span><span style="font-size:11px;color:#94a3b8;display:inline-block;transition:transform .2s;transform:${op?'rotate(180deg)':'none'}">▼</span></div><div class="cb"><div style="height:100%;width:${ch.s.length?cd/ch.s.length*100:0}%;background:${sj.color};transition:width .3s"></div></div>`;if(op){ch.s.forEach(s=>{const dn=!!STA[s.id];h+=`<div class="si" onclick="tg('${s.id}')"><div class="sc2 ${dn?'on':''}">${dn?'✓':''}</div><span style="font-size:12px;color:${dn?'#94a3b8':'#475569'};text-decoration:${dn?'line-through':'none'};flex:1;line-height:1.4">${s.n}</span></div>`;});}h+=`</div>`;});
  document.getElementById('cnt').innerHTML=h;
}
function setTab(t){tab=t;render();}
function setOff(o){off=o;render();}
function setCS(id){cs=id;oc={};render();}
function tC(id){oc[id]=!oc[id];render();}

const ROAD=[
  {phase:'1단계 · 수학/물리',color:'#0ea5e9',items:[
    {n:'일반물리학',status:'doing'},
    {n:'미적분학',status:'todo'},
    {n:'선형대수학',status:'doing'},
    {n:'공업수학',status:'todo'},
    {n:'확률/통계',status:'todo'},
  ]},
  {phase:'2단계 · 기계',color:'#f97316',items:[
    {n:'정역학',status:'todo'},
    {n:'동역학',status:'todo'},
    {n:'재료역학',status:'todo'},
  ]},
  {phase:'3단계 · 전기/전자',color:'#f59e0b',items:[
    {n:'전자공학 기초',status:'todo'},
    {n:'회로이론',status:'todo'},
  ]},
  {phase:'4단계 · 프로그래밍',color:'#10b981',items:[
    {n:'파이썬',status:'doing'},
    {n:'C언어',status:'todo'},
    {n:'C++',status:'todo'},
    {n:'자료구조/알고리즘',status:'todo'},
  ]},
  {phase:'5단계 · 하드웨어',color:'#ec4899',items:[
    {n:'아두이노',status:'todo'},
    {n:'라즈베리파이',status:'todo'},
    {n:'임베디드 C',status:'todo'},
  ]},
  {phase:'6단계 · 도구',color:'#64748b',items:[
    {n:'MATLAB/Simulink',status:'todo'},
    {n:'Git/GitHub',status:'todo'},
    {n:'CAD (SolidWorks 등)',status:'todo'},
  ]},
  {phase:'7단계 · 제어/신호',color:'#6366f1',items:[
    {n:'제어공학',status:'doing'},
    {n:'신호처리',status:'todo'},
  ]},
  {phase:'8단계 · 로봇',color:'#8b5cf6',items:[
    {n:'ROS',status:'todo'},
    {n:'컴퓨터비전 (OpenCV/YOLO)',status:'todo'},
    {n:'SLAM',status:'todo'},
    {n:'로봇 운동학/동역학',status:'todo'},
    {n:'로봇공학 실전 (엥지유니버스)',status:'todo'},
  ]},
];

const STATUS_LABEL={done:'✅ 완료',doing:'🔄 진행중',todo:'⬜ 예정'};
const STATUS_COLOR={done:'#10b981',doing:'#3b82f6',todo:'#94a3b8'};

let roadEditing=false;

function rRoad(){
  const total=ROAD.reduce((a,p)=>a+p.items.length,0);
  const done=ROAD.reduce((a,p)=>a+p.items.filter(i=>i.status==='done').length,0);
  const doing=ROAD.reduce((a,p)=>a+p.items.filter(i=>i.status==='doing').length,0);
  let h=`<div style="padding:14px 14px 8px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:15px;font-weight:900;color:#1e293b">🗺 로봇공학 로드맵</div>
      <div style="font-size:11px;color:#64748b">${done}/${total} 완료</div>
    </div>
    <div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:12px">
      <div style="height:100%;width:${Math.round(done/total*100)}%;background:linear-gradient(90deg,#10b981,#3b82f6);border-radius:3px;transition:width .4s"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:4px">
      <div style="flex:1;background:#dcfce7;border-radius:10px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#10b981">${done}</div><div style="font-size:9px;color:#64748b">완료</div></div>
      <div style="flex:1;background:#dbeafe;border-radius:10px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#3b82f6">${doing}</div><div style="font-size:9px;color:#64748b">진행중</div></div>
      <div style="flex:1;background:#f1f5f9;border-radius:10px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#94a3b8">${total-done-doing}</div><div style="font-size:9px;color:#64748b">예정</div></div>
    </div>
  </div>`;
  ROAD.forEach((phase,pi)=>{
    const pdone=phase.items.filter(i=>i.status==='done').length;
    h+=`<div class="card" style="margin-bottom:8px">
      <div style="padding:12px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9">
        <div style="width:8px;height:8px;border-radius:50%;background:${phase.color};flex-shrink:0"></div>
        <span style="font-size:13px;font-weight:800;color:${phase.color};flex:1">${phase.phase}</span>
        <span style="font-size:11px;color:#94a3b8">${pdone}/${phase.items.length}</span>
      </div>`;
    phase.items.forEach((item,ii)=>{
      const sc=STATUS_COLOR[item.status];
      const sl=STATUS_LABEL[item.status];
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f8fafc;cursor:pointer" onclick="cycleStatus(${pi},${ii})">
        <div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>
        <span style="font-size:13px;color:${item.status==='done'?'#94a3b8':'#334155'};flex:1;text-decoration:${item.status==='done'?'line-through':'none'}">${item.n}</span>
        <span style="font-size:10px;color:${sc};font-weight:700">${sl}</span>
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('cnt').innerHTML=h;
}

function cycleStatus(pi,ii){
  const order=['todo','doing','done'];
  const cur=ROAD[pi].items[ii].status;
  ROAD[pi].items[ii].status=order[(order.indexOf(cur)+1)%order.length];
  saveRoad();
  rRoad();
}
function saveRoad(){
  const data=ROAD.map(p=>p.items.map(i=>i.status));
  sv('plla3',data);
}
function loadRoad(){
  const data=ld('plla3');
  if(data)ROAD.forEach((p,pi)=>p.items.forEach((item,ii)=>{if(data[pi]&&data[pi][ii])item.status=data[pi][ii];}));
}

// ── GOALS ──
const GOALS_KEY='plla4';
let GOALS={
  annual:[
    {id:'ag1',title:'로봇공학 커리큘럼 1단계 완료',desc:'일반물리·선형대수·파이썬·제어공학 완료',done:false},
    {id:'ag2',title:'로봇공학 커리큘럼 2단계 완료',desc:'정역학·동역학·재료역학·회로이론 완료',done:false},
    {id:'ag3',title:'로봇공학 커리큘럼 3단계 완료',desc:'C언어·C++·아두이노·임베디드 완료',done:false},
    {id:'ag4',title:'로봇공학 실전 프로젝트 완료',desc:'엥지유니버스 1단계 + ROS 프로젝트',done:false},
  ],
  monthly:[],
  weekly:[],
};
let gTab='annual',editMode=false,editTarget=null;

function loadGoals(){
  const d=ld(GOALS_KEY);
  if(d)GOALS=d;
}
function saveGoals(){sv(GOALS_KEY,GOALS);}

function rGoals(){
  const now=new Date();
  const yr=now.getFullYear();
  const mo=now.getMonth()+1;
  const wk=Math.ceil(now.getDate()/7);

  const ag=GOALS.annual;
  const mg=GOALS.monthly.filter(g=>g.year===yr&&g.month===mo);
  const wg=GOALS.weekly.filter(g=>g.year===yr&&g.month===mo&&g.week===wk);

  const agD=ag.filter(g=>g.done).length;
  const mgD=mg.filter(g=>g.done).length;
  const wgD=wg.filter(g=>g.done).length;

  let h=`<div style="padding:12px 14px 8px">
    <div style="font-size:15px;font-weight:900;color:#1e293b;margin-bottom:10px">🎯 목표 관리</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <div style="flex:1;background:${gTab==='annual'?'#dbeafe':'#f1f5f9'};border-radius:10px;padding:8px;text-align:center;cursor:pointer;border:1.5px solid ${gTab==='annual'?'#3b82f6':'transparent'}" onclick="setGTab('annual')">
        <div style="font-size:13px;font-weight:800;color:${gTab==='annual'?'#1d4ed8':'#64748b'}">연간</div>
        <div style="font-size:10px;color:#94a3b8">${agD}/${ag.length}</div>
      </div>
      <div style="flex:1;background:${gTab==='monthly'?'#d1fae5':'#f1f5f9'};border-radius:10px;padding:8px;text-align:center;cursor:pointer;border:1.5px solid ${gTab==='monthly'?'#10b981':'transparent'}" onclick="setGTab('monthly')">
        <div style="font-size:13px;font-weight:800;color:${gTab==='monthly'?'#059669':'#64748b'}">${mo}월</div>
        <div style="font-size:10px;color:#94a3b8">${mgD}/${mg.length}</div>
      </div>
      <div style="flex:1;background:${gTab==='weekly'?'#fef3c7':'#f1f5f9'};border-radius:10px;padding:8px;text-align:center;cursor:pointer;border:1.5px solid ${gTab==='weekly'?'#f59e0b':'transparent'}" onclick="setGTab('weekly')">
        <div style="font-size:13px;font-weight:800;color:${gTab==='weekly'?'#b45309':'#64748b'}">W${wk}</div>
        <div style="font-size:10px;color:#94a3b8">${wgD}/${wg.length}</div>
      </div>
    </div>
  </div>`;

  if(gTab==='annual'){
    h+=renderGoalList(ag,'annual','#3b82f6',yr,mo,wk);
  } else if(gTab==='monthly'){
    h+=renderGoalList(mg,'monthly','#10b981',yr,mo,wk);
  } else {
    h+=renderGoalList(wg,'weekly','#f59e0b',yr,mo,wk);
  }
  document.getElementById('cnt').innerHTML=h;
}

function renderGoalList(list,type,color,yr,mo,wk){
  const label={annual:'연간 목표',monthly:`${mo}월 목표`,weekly:`W${wk} 주간 목표`}[type];
  let h=`<div style="padding:0 14px 8px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:12px;font-weight:700;color:${color}">${label}</span>
    <button onclick="addGoal('${type}',${yr},${mo},${wk})" style="background:${color};color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">+ 추가</button>
  </div>`;
  if(!list.length){
    h+=`<div style="text-align:center;padding:30px 20px;color:#94a3b8;font-size:13px">목표를 추가해보세요!</div>`;
  } else {
    list.forEach((g,i)=>{
      const idx=GOALS[type==='annual'?'annual':type].findIndex(x=>x.id===g.id);
      h+=`<div class="card" style="margin-bottom:8px">
        <div style="padding:12px 14px;display:flex;align-items:flex-start;gap:10px">
          <div onclick="toggleGoal('${type}',${idx})" style="width:22px;height:22px;border-radius:7px;border:2px solid ${g.done?'#10b981':'#cbd5e1'};background:${g.done?'#10b981':'transparent'};display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900;flex-shrink:0;cursor:pointer;margin-top:1px">${g.done?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:${g.done?'#94a3b8':'#1e293b'};text-decoration:${g.done?'line-through':'none'};line-height:1.4">${g.title}</div>
            ${g.desc?`<div style="font-size:11px;color:#94a3b8;margin-top:3px">${g.desc}</div>`:''}
          </div>
          <button onclick="delGoal('${type}',${idx})" style="background:none;border:none;color:#cbd5e1;font-size:16px;cursor:pointer;padding:0;flex-shrink:0">×</button>
        </div>
      </div>`;
    });
  }
  return h;
}

function setGTab(t){gTab=t;rGoals();}

function addGoal(type,yr,mo,wk){
  const title=prompt('목표를 입력하세요:');
  if(!title)return;
  const desc=prompt('설명 (선택, 건너뛰려면 취소):') || '';
  const id='g'+Date.now();
  const goal={id,title,desc,done:false};
  if(type==='annual')GOALS.annual.push(goal);
  else if(type==='monthly')GOALS.monthly.push({...goal,year:yr,month:mo});
  else GOALS.weekly.push({...goal,year:yr,month:mo,week:wk});
  saveGoals();rGoals();
}

function toggleGoal(type,idx){
  const arr=GOALS[type==='annual'?'annual':type];
  if(arr[idx])arr[idx].done=!arr[idx].done;
  saveGoals();rGoals();
}

function delGoal(type,idx){
  const arr=GOALS[type==='annual'?'annual':type];
  if(arr[idx])arr.splice(idx,1);
  saveGoals();rGoals();
}
init();
</script>
