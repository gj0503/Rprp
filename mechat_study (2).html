<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>일반물리학</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding-bottom:80px}
.header{background:rgba(248,250,252,.96);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;border-bottom:1px solid #e2e8f0;padding:12px 16px 10px}
.tabs{display:flex;background:#f8fafc;border-bottom:1px solid #e2e8f0;position:sticky;top:60px;z-index:99}
.tb{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:700;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8}
.tb.on{color:#3b82f6;border-bottom-color:#3b82f6}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin:0 14px 8px;overflow:hidden}
.item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.item:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid #cbd5e1;background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900;flex-shrink:0}
.chk.on{border-color:#10b981;background:#10b981}
.st{display:flex;overflow-x:auto;gap:6px;padding:10px 14px;border-bottom:1px solid #e2e8f0;scrollbar-width:none}
.stb{padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;color:#64748b;background:transparent;border:1px solid #e2e8f0;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ch{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.cc2{width:20px;height:20px;border-radius:6px;background:#f1f5f9;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0}
.cc2.dn{background:#10b981;border-color:#10b981}
.cc2.pt{background:rgba(16,185,129,.15);border-color:#10b981}
.cb{height:3px;background:#e2e8f0;overflow:hidden}
.si{display:flex;align-items:center;gap:9px;padding:10px 14px 10px 44px;border-top:1px solid #f1f5f9;cursor:pointer}
.sc2{width:16px;height:16px;border-radius:4px;border:2px solid #cbd5e1;background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:900;flex-shrink:0}
.sc2.on{border-color:#10b981;background:#10b981}
.bb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(248,250,252,.97);backdrop-filter:blur(16px);border-top:1px solid #e2e8f0;display:flex;z-index:200}
.bs{flex:1;padding:9px 0 13px;text-align:center;border-right:1px solid #e2e8f0}
.bs:last-child{border-right:none}
.nb{width:34px;height:34px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;color:#1e293b;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="app" id="app"><div style="display:flex;align-items:center;justify-content:center;height:200px;color:#3b82f6;font-size:14px">불러오는 중...</div></div>
<script>
const CUR=[
{id:'PH',name:'일반물리학',color:'#0ea5e9',info:'유니스터디 일반물리학 · 33강',chapters:[
  {id:'PH0',t:'OT',s:[{id:'PH00',n:'OT'}]},
  {id:'PH1',t:'Ch1~3 · 물리량·벡터',s:[
    {id:'PH01',n:'Ch1. 물리량과 측정'},
    {id:'PH02',n:'Ch3. 벡터'},
    {id:'PH03',n:'Ch3. 좌표계와 벡터 해석'},
  ]},
  {id:'PH2',t:'Ch2·4 · 운동',s:[
    {id:'PH04',n:'Ch2. 1차원 운동의 표현'},
    {id:'PH05',n:'Ch2. 1차원 운동의 종류'},
    {id:'PH06',n:'Ch4. 2차원 운동의 표현'},
    {id:'PH07',n:'Ch4. 직교 좌표계와 포물선 운동'},
    {id:'PH08',n:'Ch4. 극 좌표계와 원운동'},
  ]},
  {id:'PH3',t:'Ch5~6 · Newton 법칙',s:[
    {id:'PH09',n:'Ch5. 운동법칙과 여러가지 힘'},
    {id:'PH10',n:'Ch5. Newton 운동법칙 활용연습'},
    {id:'PH11',n:'Ch6. 등속 원운동과 Newton 법칙 적용'},
    {id:'PH12',n:'Ch6. 비등속 원운동과 Newton 법칙 적용'},
  ]},
  {id:'PH4',t:'Ch7~8 · 에너지',s:[
    {id:'PH13',n:'Ch7. 일과 에너지'},
    {id:'PH14',n:'Ch7. 일-운동에너지 정리와 퍼텐셜 에너지'},
    {id:'PH15',n:'Ch8. 에너지 보존과 전환'},
    {id:'PH16',n:'Ch8. 에너지 보존과 전환 예제풀이'},
  ]},
  {id:'PH5',t:'Ch9 · 운동량',s:[
    {id:'PH17',n:'Ch9. 운동량 보존법칙'},
    {id:'PH18',n:'Ch9. 충돌과 질량중심'},
  ]},
  {id:'PH6',t:'Ch10~11 · 회전운동',s:[
    {id:'PH19',n:'Ch10. 회전운동학'},
    {id:'PH20',n:'Ch10. 강체와 회전운동법칙'},
    {id:'PH21',n:'Ch10. 관성모멘트와 굴림운동'},
    {id:'PH22',n:'Ch11. 각운동량과 회전운동법칙'},
  ]},
  {id:'PH7',t:'Ch12~15 · 평형·중력·유체·진동',s:[
    {id:'PH23',n:'Ch12. 강체의 평형과 탄성'},
    {id:'PH24',n:'Ch13. 중력과 행성의 운동'},
    {id:'PH25',n:'Ch14. 유체역학'},
    {id:'PH26',n:'Ch15. 단진동과 진자의 운동'},
  ]},
  {id:'PH8',t:'Ch16~17 · 파동',s:[
    {id:'PH27',n:'Ch16. 파동의 전파'},
    {id:'PH28',n:'Ch16. 파동 에너지와 음파의 특성'},
    {id:'PH29',n:'Ch17. 중첩과 정상파'},
  ]},
  {id:'PH9',t:'Ch18~21 · 열역학',s:[
    {id:'PH30',n:'Ch18. 온도와 열현상'},
    {id:'PH31',n:'Ch19. 열역학 제1법칙'},
    {id:'PH32',n:'Ch20. 이상기체 분자 운동론'},
    {id:'PH33',n:'Ch21. 열역학 제2법칙과 엔트로피'},
  ]},
]},
];

const SS='2026-05-23';
const DK=['일','월','화','수','목','금','토'];
function pl(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ts(){return ds(new Date());}
function fd(s){const d=pl(s);return `${d.getMonth()+1}/${d.getDate()} (${DK[d.getDay()]})`;}
function gc(s){const w=pl(s).getDay();return w===0?0:w===6?6:8;}
function ga(){const a=[];CUR.forEach(sj=>sj.chapters.forEach(ch=>ch.s.forEach(s=>a.push({id:s.id,n:s.n,sid:sj.id,sname:sj.name,cht:ch.t,color:sj.color}))));return a;}
function bs(){const all=ga(),sc={};let i=0,d=0;const st=pl(SS);while(i<all.length&&d<2000){const dt=new Date(st);dt.setDate(st.getDate()+d);const dstr=ds(dt);const c=gc(dstr);if(c>0){sc[dstr]=all.slice(i,i+c);i+=c;}else sc[dstr]=[];d++;}return sc;}
const SC=bs();
function ld(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let STA={},SK={n:0,last:''},tab='today',off=0,cs=CUR[0].id,oc={};
function init(){const s=ld('ph1');const sk=ld('ph2');if(s)STA=s;if(sk)SK=sk;render();}
function us(){const t=ts();const y=ds(new Date(pl(t).getTime()-86400000));if(SK.last===t)return;SK=SK.last===y?{n:SK.n+1,last:t}:{n:1,last:t};}
function tg(id){STA[id]=!STA[id];us();sv('ph1',STA);sv('ph2',SK);render();}
function ov(){const a=ga();const d=a.filter(i=>STA[i.id]).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0};}
function sp(sid){const a=ga().filter(i=>i.sid===sid);const d=a.filter(i=>STA[i.id]).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0};}
function vd(){const d=new Date();d.setDate(d.getDate()+off);return ds(d);}
function render(){
  const o=ov();const v=vd();const ti=SC[v]||[];const cap=gc(v);const td=ti.filter(i=>STA[i.id]).length;
  document.getElementById('app').innerHTML=`<div class="header"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:15px;font-weight:900;color:#0ea5e9">일반물리학</div><div style="font-size:11px;color:#64748b">${SK.n}일 연속</div></div><div style="display:flex;align-items:center;gap:10px"><div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden"><div style="height:100%;width:${o.p}%;background:#0ea5e9;border-radius:3px;transition:width .6s"></div></div><span style="font-size:12px;color:#0ea5e9;font-weight:800;min-width:36px">${o.p}%</span><span style="font-size:11px;color:#94a3b8;min-width:50px;text-align:right">${o.d}/${o.t}</span></div></div><div class="tabs"><button class="tb ${tab==='today'?'on':''}" onclick="setTab('today')">📚 오늘</button><button class="tb ${tab==='toc'?'on':''}" onclick="setTab('toc')">📖 목차</button></div><div id="cnt"></div><div class="bb"><div class="bs"><div style="font-size:15px;font-weight:900;color:#10b981">${td}/${cap}</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">오늘완료</div></div><div class="bs"><div style="font-size:15px;font-weight:900;color:#0ea5e9">${o.p}%</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">전체진행</div></div><div class="bs"><div style="font-size:15px;font-weight:900;color:#f59e0b">${SK.n}일</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">연속학습</div></div><div class="bs"><div style="font-size:15px;font-weight:900;color:#94a3b8">${o.t-o.d}</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">남은항목</div></div></div>`;
  if(tab==='today')rT();else rC();
}
function rT(){
  const v=vd();const ti=SC[v]||[];const cap=gc(v);const td=ti.filter(i=>STA[i.id]).length;
  const dow=pl(v).getDay();const isR=dow===0;
  const ml=dow===0?'😴 일요일 · 완전 휴식':dow===6?'📖 토요일 · 6항목':'💻 평일 · 8항목';
  let h=`<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px 8px"><button class="nb" onclick="setOff(${off-1})">‹</button><div style="text-align:center;flex:1"><div style="font-size:16px;font-weight:900;color:#0ea5e9">${fd(v)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${ml}</div>${off!==0?`<div style="font-size:11px;color:#0ea5e9;cursor:pointer;margin-top:2px" onclick="setOff(0)">오늘로 이동</div>`:''}</div><button class="nb" onclick="setOff(${off+1})">›</button></div><div style="margin:0 14px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:#64748b;font-weight:600">오늘 진행률 · ${td}/${cap}개 완료</span><span style="font-size:20px;font-weight:900;color:#10b981">${cap>0?Math.round(td/cap*100):0}%</span></div><div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${cap>0?td/cap*100:0}%;background:linear-gradient(90deg,#10b981,#0ea5e9);border-radius:4px;transition:width .4s"></div></div></div>`;
  if(isR){h+=`<div style="text-align:center;padding:40px 20px;color:#94a3b8;font-size:13px">😴 일요일은 완전 휴식</div>`;}
  else if(!ti.length){h+=`<div style="text-align:center;padding:40px 20px;color:#94a3b8">배정 항목 없음</div>`;}
  else{h+=`<div class="card">`;ti.forEach(it=>{const dn=!!STA[it.id];h+=`<div class="item" style="${dn?'background:rgba(16,185,129,0.04)':''}" onclick="tg('${it.id}')"><div class="chk ${dn?'on':''}">${dn?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-size:10px;color:#94a3b8;margin-bottom:2px">${it.cht}</div><div style="font-size:12px;color:${dn?'#94a3b8':'#334155'};line-height:1.4;text-decoration:${dn?'line-through':'none'}">${it.n}</div></div></div>`;});h+=`</div>`;}
  document.getElementById('cnt').innerHTML=h;
}
function rC(){
  const sj=CUR[0];const pg=sp(sj.id);
  let h=`<div style="padding:14px 14px 8px"><div style="display:flex;align-items:center;justify-content:space-between"><div><span style="font-size:16px;font-weight:900;color:#0ea5e9">${sj.name}</span><div style="font-size:11px;color:#64748b;margin-top:3px">${sj.info}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:#0ea5e9">${pg.p}%</div><div style="font-size:11px;color:#64748b">${pg.d}/${pg.t}</div></div></div><div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:10px"><div style="height:100%;width:${pg.p}%;background:#0ea5e9;border-radius:3px;transition:width .4s"></div></div></div>`;
  sj.chapters.forEach(ch=>{const op=!!oc[ch.id];const cd=ch.s.filter(s=>STA[s.id]).length;const ad=cd===ch.s.length&&ch.s.length>0;const pt=cd>0&&!ad;h+=`<div class="card"><div class="ch" onclick="tC('${ch.id}')"><div class="cc2 ${ad?'dn':pt?'pt':''}">${ad?'✓':''}</div><span style="font-size:13px;font-weight:700;color:${ad?'#94a3b8':'#1e293b'};flex:1;text-decoration:${ad?'line-through':'none'}">${ch.t}</span><span style="font-size:11px;color:#94a3b8;margin-right:6px">${cd}/${ch.s.length}</span><span style="font-size:11px;color:#94a3b8;display:inline-block;transition:transform .2s;transform:${op?'rotate(180deg)':'none'}">▼</span></div><div class="cb"><div style="height:100%;width:${ch.s.length?cd/ch.s.length*100:0}%;background:#0ea5e9;transition:width .3s"></div></div>`;if(op){ch.s.forEach(s=>{const dn=!!STA[s.id];h+=`<div class="si" onclick="tg('${s.id}')"><div class="sc2 ${dn?'on':''}">${dn?'✓':''}</div><span style="font-size:12px;color:${dn?'#94a3b8':'#475569'};text-decoration:${dn?'line-through':'none'};flex:1;line-height:1.4">${s.n}</span></div>`;});}h+=`</div>`;});
  document.getElementById('cnt').innerHTML=h;
}
function setTab(t){tab=t;render();}
function setOff(o){off=o;render();}
function tC(id){oc[id]=!oc[id];render();}
init();
</script>
</body>
</html>
