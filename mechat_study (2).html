    const dstr=ds(dt);const c=gc(dstr);
    if(c>0){sc[dstr]=all.slice(i,i+c);i+=c;}else sc[dstr]=[];
    d++;
  }
  return sc;
}

      <div style="font-size:11px;color:#64748b">${SK.n}일 연속</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden"><div style="height:100%;width:${o.p}%;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:3px;transition:width .6s"></div></div>
      <span style="font-size:12px;color:#3b82f6;font-weight:800;min-width:36px">${o.p}%</span>
      <span style="font-size:11px;color:#94a3b8;min-width:50px;text-align:right">${o.d}/${o.t}</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tb ${tab==='today'?'on':''}" onclick="setTab('today')">📚 오늘</button>
    <button class="tb ${tab==='toc'?'on':''}" onclick="setTab('toc')">📖 목차</button>
    <button class="tb ${tab==='cal'?'on':''}" onclick="setTab('cal')">🗓 달력</button>
  </div>
  <div id="cnt"></div>
  <div class="bb">
    <div class="bs"><div style="font-size:15px;font-weight:900;color:#10b981">${td}/${cap}</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">오늘완료</div></div>
    <div class="bs"><div style="font-size:15px;font-weight:900;color:#3b82f6">${o.p}%</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">전체진행</div></div>
    <div class="bs"><div style="font-size:15px;font-weight:900;color:#f59e0b">${SK.n}일</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">연속학습</div></div>
    <div class="bs"><div style="font-size:15px;font-weight:900;color:#94a3b8">${o.t-o.d}</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">남은항목</div></div>
  </div>`;
  if(tab==='today')rT();else if(tab==='toc')rC();else rK();
}
function rT(){
  const v=vd();const ti=SC[v]||[];const cap=gc(v);const td=ti.filter(i=>STA[i.id]).length;
  const dow=pl(v).getDay();const isR=dow===0;
  const ml=dow===0?'😴 일요일 · 완전 휴식':dow===6?'📖 토요일 · 10항목':'💻 평일 · 16항목';
  const g={};ti.forEach(it=>{if(!g[it.sid])g[it.sid]={sname:it.sname,color:it.color,items:[]};g[it.sid].items.push(it);});
  let h=`<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px 8px">
    <button class="nb" onclick="setOff(${off-1})">‹</button>
    <div style="text-align:center;flex:1"><div style="font-size:16px;font-weight:900;color:#3b82f6">${fd(v)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${ml}</div>${off!==0?`<div style="font-size:11px;color:#3b82f6;cursor:pointer;margin-top:2px" onclick="setOff(0)">오늘로 이동</div>`:''}</div>
    <button class="nb" onclick="setOff(${off+1})">›</button>
  </div>
  <div style="margin:0 14px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:#64748b;font-weight:600">오늘 진행률 · ${td}/${cap}개 완료</span><span style="font-size:20px;font-weight:900;color:#10b981">${cap>0?Math.round(td/cap*100):0}%</span></div>
    <div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${cap>0?td/cap*100:0}%;background:linear-gradient(90deg,#10b981,#3b82f6);border-radius:4px;transition:width .4s"></div></div>
  </div>`;
  if(isR){h+=`<div style="text-align:center;padding:40px 20px;color:#94a3b8;font-size:13px">😴 일요일은 완전 휴식</div>`;}
  else if(!ti.length){h+=`<div style="text-align:center;padding:40px 20px;color:#94a3b8">배정 항목 없음</div>`;}
  else{Object.entries(g).forEach(([sid,gv])=>{
    const dc=gv.items.filter(i=>STA[i.id]).length;
    h+=`<div><div style="padding:10px 14px 4px;display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:${gv.color}"></div><span style="font-size:12px;font-weight:700;color:${gv.color}">${gv.sname}</span><span style="font-size:11px;color:#94a3b8">${dc}/${gv.items.length}</span></div><div class="card">`;
    gv.items.forEach(it=>{
      const dn=!!STA[it.id];const isP=it.n.startsWith('📝');
      h+=`<div class="item" style="${dn?'background:rgba(16,185,129,0.04)':isP?'background:#fffbeb':''}" onclick="tg('${it.id}')"><div class="chk ${dn?'on':''}">${dn?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-size:10px;color:#94a3b8;margin-bottom:2px">${it.cht}</div><div style="font-size:12px;color:${dn?'#94a3b8':'#334155'};line-height:1.4;text-decoration:${dn?'line-through':'none'}">${it.n}</div></div></div>`;
    });
    h+=`</div></div>`;
  });}
  document.getElementById('cnt').innerHTML=h;
}
function rC(){
  const sj=CUR.find(s=>s.id===cs);const pg=sp(cs);
  let h=`<div class="st">`;
  CUR.forEach(s=>{const p=sp(s.id);const ac=cs===s.id;h+=`<button class="stb" style="${ac?`background:${s.color}22;border-color:${s.color}88;color:${s.color}`:''}" onclick="setCS('${s.id}')">${s.name} <span style="opacity:.7;font-size:10px">${p.p}%</span></button>`;});
  h+=`</div><div style="padding:14px 14px 8px"><div style="display:flex;align-items:center;justify-content:space-between"><div><span style="font-size:16px;font-weight:900;color:${sj.color}">${sj.name}</span><div style="font-size:11px;color:#64748b;margin-top:3px">${sj.info}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:${sj.color}">${pg.p}%</div><div style="font-size:11px;color:#64748b">${pg.d}/${pg.t}</div></div></div><div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:10px"><div style="height:100%;width:${pg.p}%;background:${sj.color};border-radius:3px;transition:width .4s"></div></div></div>`;
  sj.chapters.forEach(ch=>{
    const op=!!oc[ch.id];const cd=ch.s.filter(s=>STA[s.id]).length;const ad=cd===ch.s.length&&ch.s.length>0;const pt=cd>0&&!ad;
    h+=`<div class="card"><div class="ch" onclick="tC('${ch.id}')"><div class="cc2 ${ad?'dn':pt?'pt':''}">${ad?'✓':''}</div><span style="font-size:13px;font-weight:700;color:${ad?'#94a3b8':'#1e293b'};flex:1;text-decoration:${ad?'line-through':'none'}">${ch.t}</span><span style="font-size:11px;color:#94a3b8;margin-right:6px">${cd}/${ch.s.length}</span><span style="font-size:11px;color:#94a3b8;display:inline-block;transition:transform .2s;transform:${op?'rotate(180deg)':'none'}">▼</span></div><div class="cb"><div style="height:100%;width:${ch.s.length?cd/ch.s.length*100:0}%;background:${sj.color};transition:width .3s"></div></div>`;
    if(op){ch.s.forEach(s=>{
      const dn=!!STA[s.id];const isP=s.n.startsWith('📝');
      h+=`<div class="si" style="${isP&&!dn?'background:#fffbeb':''}" onclick="tg('${s.id}')"><div class="sc2 ${dn?'on':''}">${dn?'✓':''}</div><span style="font-size:12px;color:${dn?'#94a3b8':'#475569'};text-decoration:${dn?'line-through':'none'};flex:1;line-height:1.4">${s.n}</span></div>`;
    });}
    h+=`</div>`;
  });
  document.getElementById('cnt').innerHTML=h;
}
function rK(){
  const today=ts();const fd2=new Date(cy,cm,1).getDay();const dim=new Date(cy,cm+1,0).getDate();
  function mds(d){return `${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  const md=[];for(let d=1;d<=dim;d++)md.push(mds(d));
  const mi=md.flatMap(s=>SC[s]||[]);const mdn=mi.filter(i=>STA[i.id]).length;
  const mp=mi.length?Math.round(mdn/mi.length*100):0;
  let cells='';for(let i=0;i<fd2;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const dstr=mds(d);const its=SC[dstr]||[];const dn=its.filter(i=>STA[i.id]).length;const tot=its.length;const pct=tot?dn/tot:0;
    const isT=dstr===today;const isSel=dstr===sd;const dow=pl(dstr).getDay();const isSu=dow===0;const isSa=dow===6;const ad=tot>0&&dn===tot;
    let cls='cc';if(isSel)cls+=' sel';else if(ad)cls+=' dal';if(isT)cls+=' tod';if(isSu)cls+=' sun';if(isSa)cls+=' sat';
    cells+=`<div class="${cls}" onclick="setSd('${dstr}')"><span class="cd">${d}</span>${!isSu&&tot>0?`<div class="mb"><div class="mbf ${ad?'dal':''}" style="width:${Math.round(pct*100)}%"></div></div>`:''}${isSu?`<span style="font-size:8px;color:#fca5a5">휴</span>`:''}${ad?`<span style="font-size:9px;color:#10b981">✓</span>`:''}</div>`;
  }
  const si=SC[sd]||[];const sdn=si.filter(i=>STA[i.id]).length;const scp=gc(sd);const sdow=pl(sd).getDay();
  let sh='';
  if(sdow===0){sh=`<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">😴 휴식일</div>`;}
  else if(!si.length){sh=`<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">배정 항목 없음</div>`;}
  else{
    const g={};si.forEach(it=>{if(!g[it.sid])g[it.sid]={sname:it.sname,color:it.color,items:[]};g[it.sid].items.push(it);});
    Object.entries(g).forEach(([sid,gv])=>{
      const dc=gv.items.filter(i=>STA[i.id]).length;
      sh+=`<div style="padding:7px 14px 5px;display:flex;align-items:center;gap:6px;background:#f8fafc;border-bottom:1px solid #e2e8f0"><div style="width:7px;height:7px;border-radius:50%;background:${gv.color}"></div><span style="font-size:11px;font-weight:700;color:${gv.color}">${gv.sname}</span><span style="font-size:10px;color:#94a3b8">${dc}/${gv.items.length}</span></div>`;
      gv.items.forEach(it=>{
        const dn=!!STA[it.id];const isP=it.n.startsWith('📝');
        sh+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;background:${dn?'rgba(16,185,129,0.04)':isP?'#fffbeb':'transparent'}" onclick="tg('${it.id}')"><div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${dn?'#10b981':'#cbd5e1'};background:${dn?'#10b981':'transparent'};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0">${dn?'✓':''}</div><span style="font-size:11px;color:${dn?'#94a3b8':'#475569'};text-decoration:${dn?'line-through':'none'};flex:1;line-height:1.4">${it.n}</span></div>`;
      });
    });
  }
  document.getElementById('cnt').innerHTML=`
  <div style="padding:12px 14px 8px">
    <div class="mh">
      <button class="nb" onclick="pm()">‹</button>
      <div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#1e293b">${cy}년 ${cm+1}월</div><div style="font-size:11px;color:#64748b;margin-top:2px">${mdn}/${mi.length}개 완료 · ${mp}%</div></div>
      <button class="nb" onclick="nm()">›</button>
    </div>
    <div style="height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:${mp}%;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:3px;transition:width .4s"></div></div>
    <div class="dh">${['일','월','화','수','목','금','토'].map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cg">${cells}</div>
  </div>
  <div class="sc">
    <div class="sh">
      <div><span style="font-size:14px;font-weight:900;color:#3b82f6">${fd(sd)}</span><span style="font-size:11px;color:#64748b;margin-left:8px">${sdow===0?'휴식':`${sdn}/${scp}개 완료`}</span></div>
      ${scp>0?`<span style="font-size:16px;font-weight:900;color:${sdn===scp?'#10b981':'#3b82f6'}">${Math.round(sdn/scp*100)}%</span>`:''}
    </div>
    ${sh}
  </div>
  <div style="height:20px"></div>`;
}
function setTab(t){tab=t;render();}
function setOff(o){off=o;render();}
function setCS(id){cs=id;oc={};render();}
function tC(id){oc[id]=!oc[id];render();}
function setSd(d){sd=d;render();}
function pm(){if(cm===0){cy--;cm=11;}else cm--;render();}
function nm(){if(cm===11){cy++;cm=0;}else cm++;render();}
init();
</script>
</body>
</html>
